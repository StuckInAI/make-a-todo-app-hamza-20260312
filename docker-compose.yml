version: '3.8'

services:
  todo-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - DATABASE_PATH=./data/todos.db
      - NODE_ENV=production
    volumes:
      - todo-data:/app/data
    restart: unless-stopped

volumes:
  todo-data:
